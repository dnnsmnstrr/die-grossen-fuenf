name: Fetch Rankings

on:
  workflow_dispatch:
    inputs:
      audio_source:
        description: 'URL or local path to the podcast MP3'
        required: true
        default: 'https://festundflauschig.de/feed/latest.mp3'

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Extract Rankings
        run: npx tsx scripts/extract-ranking.ts "${{ github.event.inputs.audio_source }}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Import to Supabase
        run: npm run import-rankings
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/rankings.ts
          git commit -m "chore: update rankings [skip ci]" || echo "No changes to commit"
          git push
